name: Secrets Demo

on:
  workflow_dispatch:        # lets you run it manually from the Actions tab
  push:
    branches: [ main ]

jobs:
  show-config:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Run the script
        env:
          # Map the GitHub Secret and Variable into environment variables.
          # secrets.* = sensitive (encrypted, masked in logs)
          # vars.*    = non-sensitive config (plaintext, visible)
          MY_SECRET: ${{ secrets.MY_SECRET }}
          MY_GREETING: ${{ vars.MY_GREETING }}
        run: |
          chmod +x ./check_secrets.sh
          ./check_secrets.sh
